name: ci
on: [ push, pull_request ]
jobs:
  ci:
    name: Tests with TYPO3 ${{ matrix.typo3 }} PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        typo3: [ '^12.4', '^13.4' ]
        php: [ '8.1', '8.2', '8.3', '8.4' ]
        exclude:
          # TYPO3 13 braucht min PHP 8.2
          - typo3: '^13.4'
            php: '8.1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup PHP version ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Pin TYPO3 + testing-framework versions
        run: |
            if [ "${{ matrix.typo3 }}" = "^12.4" ]; then
              composer require --no-update --no-interaction \
                "typo3/cms-core:${{ matrix.typo3 }}" \
                "typo3/cms-extbase:${{ matrix.typo3 }}" \
                "typo3/cms-fluid:${{ matrix.typo3 }}" \
                "typo3/cms-form:${{ matrix.typo3 }}" \
                "typo3/testing-framework:^8.0"
            else
              composer require --no-update --no-interaction \
                "typo3/cms-core:${{ matrix.typo3 }}" \
                "typo3/cms-extbase:${{ matrix.typo3 }}" \
                "typo3/cms-fluid:${{ matrix.typo3 }}" \
                "typo3/cms-form:${{ matrix.typo3 }}" \
                "typo3/testing-framework:^8.0"
            fi

      - name: Install dependencies
        run: |
            composer update -W --no-interaction --prefer-dist --no-progress

      - name: Info
        run: composer info

      - name: Lint
        run: |
          composer run ci:lint:php
          composer run ci:lint:yaml
          composer run ci:lint:typoscript

      - name: CGL
        run: composer run ci:cgl:check

      - name: Psalm
        run: composer run ci:psalm
        if: matrix.typo3 == '^13.4'

      - name: PHPStan
        run: composer run ci:stan
        if: matrix.typo3 == '^13.4'

      - name: Functional tests
        run: composer run ci:tests:functional
